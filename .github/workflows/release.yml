name: Portable EXE Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: "3.3.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: IntelliFillOCR
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-publish:
    name: Build single portable updater EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Version must use semantic format like 3.3.0 or hotfix format like 3.3.0.1. Received: $version"
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ASSET=${env:APP_NAME}-$version-portable-win-x64.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset=${env:APP_NAME}-$version-portable-win-x64.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stamp application version
        shell: pwsh
        run: |
          .\scripts\set-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build single portable updater EXE
        shell: pwsh
        run: |
          .\scripts\package-portable-exe.ps1 -Version $env:RELEASE_VERSION -Configuration Release -Platform x64 -RuntimeIdentifier win-x64

      - name: Validate release asset
        shell: pwsh
        run: |
          $asset = "release\$env:RELEASE_ASSET"
          if (-not (Test-Path $asset)) {
            throw "Release asset was not created: $asset"
          }
          $item = Get-Item $asset
          if ($item.Length -lt 100MB) {
            throw "Portable EXE is unexpectedly small: $($item.Length) bytes"
          }
          Write-Host "Validated release asset: $($item.FullName) ($($item.Length) bytes)"

      - name: Write release notes
        shell: pwsh
        run: |
          @(
            "# What's New in IntelliFill OCR $env:RELEASE_VERSION",
            "",
            "Version $env:RELEASE_VERSION",
            "- Restored the full Actions workflow in the native WinUI app.",
            "- Added a single portable updater EXE release asset.",
            "- The portable EXE installs or updates IntelliFill OCR under the current user profile and launches the app.",
            "- The in-app update checker now downloads and runs the same portable updater EXE.",
            "- Cleaned the GitHub release pipeline so only one Windows asset is attached.",
            "",
            "Asset:",
            "- $env:RELEASE_ASSET"
          ) | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}-portable-win-x64
          path: release/${{ steps.version.outputs.asset }}
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = "release/$env:RELEASE_ASSET"

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            $existing = gh release view $env:RELEASE_TAG --json assets --jq '.assets[].name'
            foreach ($name in $existing) {
              if ($name -like "IntelliFillOCR-*") {
                gh release delete-asset $env:RELEASE_TAG $name -y
              }
            }
            gh release upload $env:RELEASE_TAG $asset --clobber
            gh release edit $env:RELEASE_TAG --notes-file release-notes.md --title "IntelliFill OCR $env:RELEASE_VERSION"
          } else {
            gh release create $env:RELEASE_TAG $asset --title "IntelliFill OCR $env:RELEASE_VERSION" --notes-file release-notes.md --target $env:GITHUB_SHA
          }
