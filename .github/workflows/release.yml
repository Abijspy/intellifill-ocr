name: Avalonia Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: "3.4.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: IntelliFillOCR
  DOTNET_VERSION: "8.0.x"

jobs:
  windows-nsis:
    name: Windows NSIS installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Version must use semantic format like 3.4.0 or hotfix format like 3.4.0.1. Received: $version"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Stamp application version
        shell: pwsh
        run: .\scripts\set-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Build NSIS setup EXE
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version $env:RELEASE_VERSION -RuntimeIdentifier win-x64

      - name: Collect Windows asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $asset = "installer\out\IntelliFillOCR-$env:RELEASE_VERSION-setup-win-x64.exe"
          if (-not (Test-Path $asset)) {
            throw "Windows installer was not created: $asset"
          }
          Copy-Item $asset release-assets\

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: release-assets/*
          if-no-files-found: error

  linux-packages:
    name: Linux DEB/RPM/tar packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux package tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Stamp application version
        shell: pwsh
        run: ./scripts/set-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Build Linux packages
        shell: bash
        run: bash scripts/package-linux.sh "$RELEASE_VERSION" linux-x64 Release

      - name: Collect Linux assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp release/linux/*.tar.gz release-assets/
          cp release/linux/*.deb release-assets/
          cp release/linux/*.rpm release-assets/

      - name: Upload Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - windows-nsis
      - linux-packages
    steps:
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<NOTES
          # What's New in IntelliFill OCR $RELEASE_VERSION

          Version $RELEASE_VERSION
          - Migrated the desktop UI to Avalonia for Windows and Linux distribution support.
          - Added Windows NSIS setup installer with shortcuts, uninstall support, install details, and optional Tesseract OCR install.
          - Removed the old portable self-extracting updater EXE build.
          - Added Debian/Ubuntu .deb, Fedora .rpm, and Linux tar.gz release assets.
          - Keeps offline document parsing, visual region selection, zoom/rotate preview, mapping, validation, SQLite save, and traceable exports.
          NOTES

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            for name in $(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name'); do
              gh release delete-asset "$RELEASE_TAG" "$name" -y
            done
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md --title "IntelliFill OCR $RELEASE_VERSION"
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "IntelliFill OCR $RELEASE_VERSION" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi
