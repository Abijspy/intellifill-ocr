name: CI/CD Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: "2.3.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build Windows EXE and publish release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    env:
      APP_NAME: IntelliFillOCR
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Version must use semantic format like 1.0.0 or hotfix format like 2.2.2.1. Received: $version"
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_PACKAGE=${env:APP_NAME}-$version-win-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PACKAGE=${env:APP_NAME}-Setup-$version-win-x64.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package=${env:APP_NAME}-$version-win-x64.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer=${env:APP_NAME}-Setup-$version-win-x64.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Validate Python source
        shell: pwsh
        run: |
          python -m compileall src

      - name: Build standalone EXE
        shell: pwsh
        run: |
          pyinstaller .\pyinstaller\IntelliFillOCR.spec --clean --noconfirm

      - name: Package release zip
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 -Version $env:RELEASE_VERSION

      - name: Install Inno Setup compiler
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -Version $env:RELEASE_VERSION

      - name: Write release notes
        shell: pwsh
        run: |
          @(
            "# What's New in IntelliFill OCR $env:RELEASE_VERSION",
            "",
            "🗂️ Version $env:RELEASE_VERSION",
            "- Added full multi-table template support for DOCX, XLSX/XLS, CSV, PDF, and OCR templates.",
            "- Output Preview now lets users choose which template table to fill.",
            "- Manual mappings, intelligent matching, learned templates, validation, SQLite storage, and exports now remember destination table numbers.",
            "- CSV, Excel, Word, PDF, and preserved-layout exports include all template tables in one output document.",
            "- Removed the external repository link from the in-app What's New page.",
            "- Added GitHub Actions builds for Debian and Fedora Linux packages.",
            "- Added Linux-aware update downloads for .deb/.rpm packages with install commands instead of launching a Windows installer.",
            "- Added automatic Tesseract detection on Ubuntu/Debian/Fedora through PATH and common install locations.",
            "",
            "Assets:",
            "- IntelliFillOCR-Setup-$env:RELEASE_VERSION-win-x64.exe",
            "- IntelliFillOCR-$env:RELEASE_VERSION-win-x64.zip",
            "- IntelliFillOCR-$env:RELEASE_VERSION-linux-x64.deb",
            "- IntelliFillOCR-$env:RELEASE_VERSION-linux-x64.rpm"
          ) | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}-win-x64
          path: |
            release/${{ steps.version.outputs.package }}
            installer/out/${{ steps.version.outputs.installer }}
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $portableAsset = "release/$env:RELEASE_PACKAGE"
          $installerAsset = "installer/out/$env:INSTALLER_PACKAGE"

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $portableAsset $installerAsset --clobber
          } else {
            gh release create $env:RELEASE_TAG $portableAsset $installerAsset --title "IntelliFill OCR $env:RELEASE_VERSION" --notes-file release-notes.md --target $env:GITHUB_SHA
          }

  build-linux-packages:
    name: Build Debian and Fedora packages
    runs-on: ubuntu-latest
    needs: build-and-publish

    env:
      APP_NAME: IntelliFillOCR
      PYTHON_VERSION: "3.11"
      RELEASE_VERSION: ${{ needs.build-and-publish.outputs.version }}
      RELEASE_TAG: ${{ needs.build-and-publish.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package names
        shell: bash
        run: |
          echo "DEB_PACKAGE=${APP_NAME}-${RELEASE_VERSION}-linux-x64.deb" >> "$GITHUB_ENV"
          echo "RPM_PACKAGE=${APP_NAME}-${RELEASE_VERSION}-linux-x64.rpm" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Linux packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libgl1 libegl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Validate Python source
        shell: bash
        run: |
          python -m compileall src

      - name: Build Linux executable
        shell: bash
        run: |
          pyinstaller pyinstaller/IntelliFillOCR.spec --clean --noconfirm

      - name: Build Debian package
        shell: bash
        run: |
          set -euo pipefail
          ROOT="linux-packages/deb/intellifill-ocr"
          rm -rf "$ROOT"
          mkdir -p "$ROOT/DEBIAN" "$ROOT/opt/intellifill-ocr" "$ROOT/usr/share/applications" "$ROOT/usr/share/pixmaps"
          cp -a dist/IntelliFillOCR/. "$ROOT/opt/intellifill-ocr/"
          cp assets/logo.png "$ROOT/usr/share/pixmaps/intellifill-ocr.png"
          cat > "$ROOT/usr/share/applications/intellifill-ocr.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=IntelliFill OCR
          Comment=Offline OCR data extraction and table filling
          Exec=/opt/intellifill-ocr/IntelliFillOCR
          Icon=intellifill-ocr
          Terminal=false
          Categories=Office;Utility;
          EOF
          sed -i 's/^          //' "$ROOT/usr/share/applications/intellifill-ocr.desktop"
          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: intellifill-ocr
          Version: ${RELEASE_VERSION}
          Section: office
          Priority: optional
          Architecture: amd64
          Maintainer: IntelliFill OCR
          Depends: tesseract-ocr, libgl1, libegl1, libxkbcommon-x11-0, libxcb-cursor0
          Description: Offline OCR data extraction and table filling desktop app
           IntelliFill OCR fills structured templates from OCR and parsed documents fully offline.
          EOF
          sed -i 's/^          //' "$ROOT/DEBIAN/control"
          mkdir -p linux-packages/out
          dpkg-deb --build "$ROOT" "linux-packages/out/${DEB_PACKAGE}"

      - name: Build Fedora package
        shell: bash
        run: |
          set -euo pipefail
          TOPDIR="$PWD/linux-packages/rpmbuild"
          rm -rf "$TOPDIR"
          mkdir -p "$TOPDIR/BUILD" "$TOPDIR/BUILDROOT" "$TOPDIR/RPMS" "$TOPDIR/SOURCES" "$TOPDIR/SPECS" linux-packages/out
          cat > "$TOPDIR/SPECS/intellifill-ocr.spec" <<EOF
          Name: intellifill-ocr
          Version: ${RELEASE_VERSION}
          Release: 1%{?dist}
          Summary: Offline OCR data extraction and table filling desktop app
          License: Proprietary
          BuildArch: x86_64
          Requires: tesseract
          Requires: mesa-libGL
          Requires: libxkbcommon-x11
          Requires: xcb-util-cursor

          %description
          IntelliFill OCR fills structured templates from OCR and parsed documents fully offline.

          %install
          mkdir -p %{buildroot}/opt/intellifill-ocr
          cp -a ${PWD}/dist/IntelliFillOCR/. %{buildroot}/opt/intellifill-ocr/
          mkdir -p %{buildroot}/usr/share/applications %{buildroot}/usr/share/pixmaps
          cp ${PWD}/assets/logo.png %{buildroot}/usr/share/pixmaps/intellifill-ocr.png
          cat > %{buildroot}/usr/share/applications/intellifill-ocr.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=IntelliFill OCR
          Comment=Offline OCR data extraction and table filling
          Exec=/opt/intellifill-ocr/IntelliFillOCR
          Icon=intellifill-ocr
          Terminal=false
          Categories=Office;Utility;
          DESKTOP

          %files
          /opt/intellifill-ocr
          /usr/share/applications/intellifill-ocr.desktop
          /usr/share/pixmaps/intellifill-ocr.png
          EOF
          sed -i 's/^          //' "$TOPDIR/SPECS/intellifill-ocr.spec"
          rpmbuild -bb --define "_topdir $TOPDIR" "$TOPDIR/SPECS/intellifill-ocr.spec"
          cp "$TOPDIR/RPMS/x86_64/intellifill-ocr-${RELEASE_VERSION}-1"*.rpm "linux-packages/out/${RPM_PACKAGE}"

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-linux-x64
          path: |
            linux-packages/out/${{ env.DEB_PACKAGE }}
            linux-packages/out/${{ env.RPM_PACKAGE }}
          if-no-files-found: error

      - name: Upload Linux packages to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "linux-packages/out/${DEB_PACKAGE}" \
            "linux-packages/out/${RPM_PACKAGE}" \
            --clobber
